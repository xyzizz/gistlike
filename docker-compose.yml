services:
  gistlike:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gistlike
    ports:
      - "8080:8080"
    environment:
      APP_ADDR: ":8080"
      APP_DB_PATH: "data/snippets.db"
      APP_NAME: "GistLike"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
