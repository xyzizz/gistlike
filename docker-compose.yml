services:
  gistlike:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gistlike
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_ADDR: ":8080"
      APP_DB_PATH: "data/snippets.db"
      APP_NAME: "GistLike"
      GIN_MODE: "release"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
